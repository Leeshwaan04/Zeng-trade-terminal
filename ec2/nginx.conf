# ── Nginx Config for ZenG Trade EC2 Proxy ──────────────────
# Place at: /etc/nginx/sites-available/zeng-proxy
# Symlink:  ln -s /etc/nginx/sites-available/zeng-proxy /etc/nginx/sites-enabled/

# Upgrade HTTP → WebSocket
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=10r/s;

server {
    listen 80;
    server_name ws.zengtrade.in;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ws.zengtrade.in;

    # ── SSL (Certbot will fill these in) ────────────────────
    ssl_certificate     /etc/letsencrypt/live/ws.zengtrade.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ws.zengtrade.in/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ────────────────────────────────────
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-Robots-Tag none;
    add_header Access-Control-Allow-Origin "https://www.zengtrade.in" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Access-Token" always;

    # ── WebSocket Proxy (port 8080) ─────────────────────────
    location /ws {
        limit_req zone=ws_limit burst=20 nodelay;

        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # Keep WebSocket alive (Kite drops idle connections after 5s)
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
        proxy_connect_timeout 10s;

        # Disable buffering for streaming
        proxy_buffering off;
    }

    # ── REST API Proxy (port 8081) ──────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8081/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # ── Health Check (public) ───────────────────────────────
    location /health {
        proxy_pass         http://127.0.0.1:8081/health;
        proxy_http_version 1.1;
        access_log         off;
    }

    # ── Block everything else ───────────────────────────────
    location / {
        return 404;
    }
}
