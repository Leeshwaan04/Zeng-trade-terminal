apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: zengtrade-trading
spec:
  replicas: 3
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: zengtrade/order-service:latest
          ports:
            - containerPort: 8080
          env:
            - name: KITE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kite-secrets
                  key: api-key
            - name: KITE_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kite-secrets
                  key: access-token
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
