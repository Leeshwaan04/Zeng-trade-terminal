name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend-lint-build:
    name: Frontend — lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          NEXT_PUBLIC_EC2_WS_URL: wss://ws.zengtrade.in
          NEXT_PUBLIC_KITE_API_KEY: dummy_ci_key

  broker-gateway-build:
    name: Broker Gateway — Go build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: services/trading/broker-gateway/go.sum

      - name: Build broker-gateway
        working-directory: services/trading/broker-gateway
        run: go build ./...

      - name: Vet broker-gateway
        working-directory: services/trading/broker-gateway
        run: go vet ./...

  broker-adapter-build:
    name: Broker Adapter — Go build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: services/trading/broker-adapter/go.sum

      - name: Build broker-adapter
        working-directory: services/trading/broker-adapter
        run: go build ./...
