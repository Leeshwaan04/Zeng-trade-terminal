name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend.yml"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_EC2_WS_URL: ${{ secrets.NEXT_PUBLIC_EC2_WS_URL }}
          NEXT_PUBLIC_KITE_API_KEY: ${{ secrets.NEXT_PUBLIC_KITE_API_KEY }}

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_EC2_WS_URL=${{ secrets.NEXT_PUBLIC_EC2_WS_URL }} \
            --build-arg NEXT_PUBLIC_KITE_API_KEY=${{ secrets.NEXT_PUBLIC_KITE_API_KEY }} \
            -t ${{ secrets.ECR_REGISTRY }}/zengtrade-frontend:${{ github.sha }} \
            -t ${{ secrets.ECR_REGISTRY }}/zengtrade-frontend:latest \
            .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push to ECR
        run: |
          docker push ${{ secrets.ECR_REGISTRY }}/zengtrade-frontend:${{ github.sha }}
          docker push ${{ secrets.ECR_REGISTRY }}/zengtrade-frontend:latest

      - name: Deploy to EC2 (prod)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/zengtrade
            docker compose -f docker-compose.prod.yml pull app
            docker compose -f docker-compose.prod.yml up -d --no-deps app
            docker image prune -f
