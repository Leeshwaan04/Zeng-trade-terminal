# ZenG Trade — Production EC2 Deployment
#
# Runs on a single EC2 instance (t3.medium or better):
#   - zengtrade-app   : Next.js (port 3000, internal only)
#   - zengtrade-relay : Kite WebSocket relay (port 8080, internal only)
#   - nginx           : TLS termination + reverse proxy (ports 80/443, public)
#
# First-time setup:
#   1. cp .env.production.example .env.production  &&  edit it
#   2. certbot certonly --standalone -d zengtrade.in -d ws.zengtrade.in
#   3. docker compose -f docker-compose.prod.yml up -d --build

version: '3.9'

services:
  # ── Next.js App ─────────────────────────────────────────────
  app:
    image: ${ECR_REGISTRY}/zengtrade-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_ vars are baked into the JS bundle at build time
        NEXT_PUBLIC_EC2_WS_URL: ${NEXT_PUBLIC_EC2_WS_URL:-wss://ws.zengtrade.in}
        NEXT_PUBLIC_KITE_API_KEY: ${NEXT_PUBLIC_KITE_API_KEY}
    container_name: zengtrade-app
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── WebSocket Relay ──────────────────────────────────────────
  relay:
    image: ${ECR_REGISTRY}/zengtrade-relay:latest
    build:
      context: ./server/relay
      dockerfile: Dockerfile
    container_name: zengtrade-relay
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      - PORT=8080
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://zengtrade.in,https://www.zengtrade.in}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Nginx TLS Proxy ──────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: zengtrade-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
      - relay
    networks:
      - internal

networks:
  internal:
    driver: bridge
