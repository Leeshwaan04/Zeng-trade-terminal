# ZenG Trade — Nginx reverse proxy
# ─────────────────────────────────────────────────────────────────────────────
# TLS termination for two virtual hosts:
#   zengtrade.in / www.zengtrade.in  → Next.js app (port 3000)
#   ws.zengtrade.in                  → WebSocket relay (port 8080)
#
# Prerequisites:
#   certbot certonly --standalone -d zengtrade.in -d www.zengtrade.in -d ws.zengtrade.in
#
# Nginx restarts automatically if the certbot renewal hook runs:
#   /etc/letsencrypt/renewal-hooks/deploy/01-reload-nginx.sh
#   #!/bin/sh
#   docker exec zengtrade-nginx nginx -s reload

# ── HTTP → HTTPS redirect ─────────────────────────────────────
server {
    listen 80;
    server_name zengtrade.in www.zengtrade.in ws.zengtrade.in;
    return 301 https://$host$request_uri;
}

# ── Main App ──────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name zengtrade.in www.zengtrade.in;

    ssl_certificate     /etc/letsencrypt/live/zengtrade.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zengtrade.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;

    # Gzip for static assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Proxy to Next.js
    location / {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Next.js HMR WebSocket (dev only — harmless in prod)
    location /_next/webpack-hmr {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
    }
}

# ── WebSocket Relay ───────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name ws.zengtrade.in;

    ssl_certificate     /etc/letsencrypt/live/zengtrade.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zengtrade.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass          http://relay:8080;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade    $http_upgrade;
        proxy_set_header    Connection "upgrade";
        proxy_set_header    Host       $host;
        proxy_set_header    X-Real-IP  $remote_addr;
        # Keep WebSocket connections alive for 24h (Kite WS stays open all session)
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }
}
